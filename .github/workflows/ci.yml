name: "CI"
on: ["push", "pull_request"]

jobs:
  test_and_build:
    name: "Build mix release"
    runs-on: "ubuntu-latest"
    steps:
    - uses: actions/checkout@v4

    - name: Setup Elixir
      uses: erlef/setup-beam@v1
      with:
        version-file: .tool-versions
        version-type: strict

    - run: |
        mix local.hex --force
        mix local.rebar --force
        mix deps.get
        mix lint
        # mix test
